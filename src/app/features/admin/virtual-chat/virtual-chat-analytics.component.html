<section class="analytics" id="virtual-chat-analytics">

  <!-- Page Title -->
  <div class="analytics__header">
    <h1 class="analytics__title">Virtual Chat Analytics</h1>
  </div>

  <!-- Controls Bar -->
  <div class="analytics__controls">
    <div class="analytics__date-pickers">
      <!-- Start Date -->
      <div class="date-field">
        <label class="date-field__label" for="startDate">Start date</label>
        <div class="date-field__input-wrap">
          <input
            type="date"
            id="startDate"
            class="date-field__input"
            [(ngModel)]="startDate"
            (change)="onDateChange()"
          />
          <svg class="date-field__icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z"/>
          </svg>
        </div>
      </div>

      <!-- End Date -->
      <div class="date-field">
        <label class="date-field__label" for="endDate">End date</label>
        <div class="date-field__input-wrap">
          <input
            type="date"
            id="endDate"
            class="date-field__input"
            [(ngModel)]="endDate"
            (change)="onDateChange()"
          />
          <svg class="date-field__icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z"/>
          </svg>
        </div>
      </div>
    </div>

    <div class="analytics__actions">
      <button class="btn-print" id="printReportBtn" (click)="printReport()">
        <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
          <path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/>
        </svg>
        PRINT REPORT
      </button>
      <button class="btn-download" id="downloadReportBtn" (click)="downloadReport()">
        <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
          <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
        </svg>
      </button>
    </div>
  </div>

  @if (isLoading) {
    <!-- Skeleton Loading -->
    <div class="analytics__skeleton">
      <div class="skeleton-kpi"></div>
      <div class="skeleton-kpi"></div>
    </div>
    <div class="skeleton-chart"></div>
  } @else {

    <!-- KPI Cards -->
    <div class="kpi-row">
      <!-- Total Chats -->
      <div class="kpi-tile kpi-tile--chats" id="totalChatsCard">
        <div class="kpi-tile__content">
          <span class="kpi-tile__label">Total chats</span>
          <span class="kpi-tile__value">{{ totalChats }}</span>
        </div>
        <div class="kpi-tile__icon-wrap">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/>
          </svg>
        </div>
      </div>

      <!-- Total Minutes -->
      <div class="kpi-tile kpi-tile--minutes" id="totalMinutesCard">
        <div class="kpi-tile__content">
          <span class="kpi-tile__label">Total minutes</span>
          <span class="kpi-tile__value">{{ totalMinutes }}</span>
        </div>
        <div class="kpi-tile__icon-wrap">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- Chart Card -->
    <div class="chart-card" id="dailyCallsChart">
      <div class="chart-card__header">
        <h2 class="chart-card__title">Total calls per day</h2>
        <div class="chart-card__period">
          {{ formatDisplayDate(startDate) }} – {{ formatDisplayDate(endDate) }}
        </div>
      </div>
      <div class="chart-card__body">
        <canvas #chartCanvas class="chart-canvas"></canvas>
      </div>
    </div>

  }

</section>
