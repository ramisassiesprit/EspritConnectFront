<div class="entreprise-shell">
  <app-navbar></app-navbar>

  <div class="entreprise-shell__layout">
    <aside class="entreprise-shell__sidebar">
      <div class="brand-card">
        <h3>Espace Entreprise</h3>
        <p>Publish your opportunities and track recruitment in one place.</p>
      </div>

      <nav class="menu">
        <a
          *ngFor="let item of menu"
          [routerLink]="item.link"
          routerLinkActive="is-active"
          class="menu__item"
        >
          <span class="menu__icon">
  <svg *ngIf="item.icon === 'business_center'" class="menu__icon-svg" viewBox="0 0 24 24" fill="currentColor">
    <path d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z"/>
  </svg>

  <svg *ngIf="item.icon === 'star'" class="menu__icon-svg" viewBox="0 0 24 24" fill="currentColor">
    <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zm4.24 16L12 15.45 7.77 18l1.12-4.81-3.73-3.23 4.92-.42L12 5l1.92 4.53 4.92.42-3.73 3.23L16.23 18z"/>
  </svg>

  <svg *ngIf="item.icon === 'view_kanban'" class="menu__icon-svg" viewBox="0 0 24 24" fill="currentColor">
    <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM7 17H5V7h2v10zm4-4H9V7h2v6zm4-2h-2V7h2v4zm4 4h-2V7h2v8z"/>
  </svg>

  <svg *ngIf="item.icon === 'insights'" class="menu__icon-svg" viewBox="0 0 24 24" fill="currentColor">
    <path d="M21 8c-1.45 0-2.26 1.48-1.91 2.57l-3.52 3.52c-.3-.08-.72-.08-1.02 0l-2.52-2.52c.35-1.09-.46-2.57-1.91-2.57s-2.26 1.48-1.91 2.57L3.63 16.1C2.54 15.75 1 16.56 1 18c0 1.1.9 2 2 2s2.26-1.48 1.91-2.57l4.58-4.58c.3.08.72.08 1.02 0l2.52 2.52c-.35 1.09.46 2.57 1.91 2.57s2.26-1.48 1.91-2.57l3.52-3.52c1.09.35 2.57-.46 2.57-1.91 0-1.1-.9-2-2-2z"/>
    <path d="M17.29 8.29l1.42-1.42-2.59-2.59c-.39-.39-1.02-.39-1.41 0L12 7.12l-2.71-2.71c-.39-.39-1.02-.39-1.41 0L6.46 5.83l3.43 3.44 2.12-2.12 3.43 3.43 1.85-2.29z" opacity="0.3"/>
  </svg>

  <svg *ngIf="item.icon === 'person'" class="menu__icon-svg" viewBox="0 0 24 24" fill="currentColor">
    <path d="M12 12c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm0 2c-3.33 0-10 1.67-10 5v3h20v-3c0-3.33-6.67-5-10-5z"/>
  </svg>

  <svg *ngIf="item.icon === 'settings'" class="menu__icon-svg" viewBox="0 0 24 24" fill="currentColor">
    <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.06-.94l2.03-1.58a.5.5 0 0 0 .12-.61l-1.92-3.32a.5.5 0 0 0-.59-.22l-2.39.96a7.03 7.03 0 0 0-1.62-.94l-.36-2.54a.5.5 0 0 0-.48-.41h-3.84a.5.5 0 0 0-.47.41l-.36 2.54c-.59.24-1.13.56-1.62.94l-2.39-.96a.5.5 0 0 0-.59.22L2.73 8.87a.5.5 0 0 0 .12.61l2.03 1.58c-.04.3-.06.62-.06.94 0 .32.02.64.06.94l-2.03 1.58a.5.5 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.5.5 0 0 0-.12-.61l-2.03-1.58zM12 15.6A3.6 3.6 0 1 1 12 8.4a3.6 3.6 0 0 1 0 7.2z"/>
  </svg>
</span>
          <span>
            <strong>{{ item.label }}</strong>
            <small>{{ item.description }}</small>
          </span>
        </a>
      </nav>

      <!-- View Switcher -->
      <div class="view-switcher">
        <span class="view-switcher__label">
          <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14">
            <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
          </svg>
          Vue active
        </span>
        <button class="view-switcher__toggle" (click)="switchView()" [class.is-student]="isStudentView" [title]="isStudentView ? 'Revenir à la vue Entreprise' : 'Passer en vue Étudiant'">
          <span class="view-switcher__pill"></span>
          <span class="view-switcher__option" [class.active]="!isStudentView">Entreprise</span>
          <span class="view-switcher__option" [class.active]="isStudentView">Étudiant</span>
        </button>
      </div>
    </aside>

    <main class="entreprise-shell__main">
      <section class="page-head">
        <h1>Company Dashboard</h1>
        <p>Submit jobs, upload visuals, and monitor candidates after admin approval.</p>
      </section>

      <router-outlet></router-outlet>
    </main>
  </div>
</div>
