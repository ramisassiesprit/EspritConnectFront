<div *ngIf="isOpen" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50">
  <div class="bg-white rounded-xl shadow-xl w-full max-w-2xl overflow-hidden flex flex-col max-h-[90vh]">
    <div class="p-6 overflow-y-auto">
      <h2 class="text-xl font-medium text-gray-800 mb-6">Request help</h2>
      
      <!-- Select Help Type -->
      <div class="mb-6 relative w-64">
        <select 
          [(ngModel)]="selectedType"
          class="w-full appearance-none bg-white border border-gray-300 text-gray-700 py-2.5 px-4 pr-8 rounded-full focus:outline-none focus:ring-2 focus:ring-[#ED1C24] focus:border-transparent">
          <option value="" disabled selected>Choose help type*</option>
          <option *ngFor="let option of helpOptions" [value]="option">{{ option }}</option>
        </select>
        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
          <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
        </div>
      </div>

      <!-- Editor -->
      <div class="border border-gray-300 rounded-lg overflow-hidden flex flex-col">
        <quill-editor 
          [(ngModel)]="message" 
          [placeholder]="'Write your message to ' + user.firstName + '. Please include some background about yourself as well as a clear explanation of how you would like help.'"
          [modules]="{
            toolbar: [
              ['bold', 'italic', 'underline'],
              [{ 'align': [] }],
              [{ 'list': 'ordered'}, { 'list': 'bullet' }],
              ['link']
            ]
          }"
          class="min-h-[200px] h-[200px] bg-white">
        </quill-editor>
      </div>
      
      <div class="text-right text-xs text-gray-500 mt-2">
        {{ getTextLength() }} / 4000
      </div>

      <!-- Actions -->
      <div class="flex items-center gap-4 mt-6">
        <button 
          (click)="onSend()"
          [disabled]="!isValid()"
          [ngClass]="isValid() ? 'bg-[#ED1C24] text-white hover:bg-[#D31920]' : 'bg-gray-200 text-white cursor-not-allowed'"
          class="flex items-center gap-2 px-6 py-2.5 rounded-full font-bold text-sm transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="transform -rotate-45"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
          Send
        </button>
        <button 
          (click)="onDiscard()"
          class="text-[#ED1C24] font-medium text-sm hover:underline uppercase tracking-wide px-2">
          DISCARD
        </button>
      </div>
    </div>
  </div>
</div>
