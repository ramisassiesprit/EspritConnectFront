<div class="settings-container p-6">
  <h2 class="text-2xl font-bold mb-6">Mentoring & Help Settings</h2>
  
  @if (!isLoaded) {
    <div class="text-center text-gray-500 py-4">Loading your preferences...</div>
  } @else {
    <app-help-mentoring-form
      [initialHelp]="helpData"
      (save)="onSave($event)"
      (cancel)="onCancel()">
    </app-help-mentoring-form>
  }
</div>
