<style>
  .custom-scrollbar::-webkit-scrollbar {
    width: 6px;
  }
  .custom-scrollbar::-webkit-scrollbar-track {
    background: transparent; 
  }
  .custom-scrollbar::-webkit-scrollbar-thumb {
    background: #d1d5db; 
    border-radius: 10px;
  }
  .custom-scrollbar::-webkit-scrollbar-thumb:hover {
    background: #9ca3af; 
  }
</style>

<div class="rounded-[24px] bg-white p-5 shadow-sm border border-[#ececec] flex flex-col h-full">
  <div class="flex items-center justify-between mb-5">
    <h3 class="text-[20px] font-bold text-[#4B5563]">Recent feed posts</h3>
    <a routerLink="/etudiant/feed" class="text-[13px] font-bold uppercase tracking-wider text-[#e50043] hover:underline">More Posts</a>
  </div>
  
  <div class="flex-1 overflow-y-auto pr-2 custom-scrollbar flex flex-col gap-4" style="max-height: 330px;">
    <!-- Loading State -->
    <div *ngIf="loading" class="text-center py-6 text-gray-500 flex flex-col items-center justify-center">
      <div class="animate-spin inline-block w-6 h-6 border-[3px] border-current border-t-transparent text-[#e50043] rounded-full" role="status" aria-label="loading">
        <span class="sr-only">Loading...</span>
      </div>
      <p class="mt-2 text-sm">Loading posts...</p>
    </div>

    <!-- Error State -->
    <div *ngIf="!loading && error" class="text-center py-6 text-red-500">
      <p class="text-sm">{{ error }}</p>
      <button (click)="loadRecentPosts()" class="mt-2 text-xs font-semibold text-[#e50043] underline">Retry</button>
    </div>

    <!-- Empty State -->
    <div *ngIf="!loading && !error && recentPosts.length === 0" class="text-center py-6 text-gray-500">
      <p class="text-sm">No posts in the feed yet.</p>
    </div>

    <!-- Dynamic Posts List -->
    <ng-container *ngIf="!loading && !error && recentPosts.length > 0">
      <article *ngFor="let post of recentPosts" class="bg-[#f8f9fa] rounded-2xl p-5 flex gap-4">
        <!-- Avatar Column -->
        <div class="w-[52px] h-[52px] rounded-full shrink-0 flex items-center justify-center overflow-hidden">
          <img *ngIf="post.user.avatarUrl" [src]="getFullUrl(post.user.avatarUrl)" alt="Avatar" class="w-full h-full object-cover" />
          <div *ngIf="!post.user.avatarUrl" class="w-full h-full bg-gray-200 flex items-center justify-center">
            <svg class="w-8 h-8 text-white mt-2" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" />
            </svg>
          </div>
        </div>
        
        <!-- Details Column -->
        <div class="flex-1">
          <div class="flex items-start justify-between">
            <div class="flex items-center gap-2 flex-wrap">
              <h4 class="text-[16px] font-bold text-[#e50043]">{{ post.user.firstName }} {{ post.user.lastName }}</h4>
              <div class="flex items-center gap-1.5">
                <!-- Purple hexagon badge -->
                <div class="bg-[#8b2db5] text-white w-5 h-5 flex items-center justify-center" style="clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);">
                  <svg class="w-[11px] h-[11px]" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M13 6a3 3 0 11-6 0 3 3 0 016 0zM18 8a2 2 0 11-4 0 2 2 0 014 0zM14 15a4 4 0 00-8 0v3h8v-3zM6 8a2 2 0 11-4 0 2 2 0 014 0zM16 18v-3a5.972 5.972 0 00-.75-2.906A3.005 3.005 0 0119 15v3h-3zM4.75 12.094A5.973 5.973 0 004 15v3H1v-3a3 3 0 013.75-2.906z" />
                  </svg>
                </div>
                <!-- Gold shield badge -->
                <div class="bg-[#dda117] text-white w-5 h-5 flex items-center justify-center" style="clip-path: polygon(50% 100%, 100% 80%, 100% 0, 0 0, 0 80%);">
                  <svg class="w-[11px] h-[11px]" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M3 6a3 3 0 013-3h10a1 1 0 01.8 1.6L14.25 8l2.55 3.4A1 1 0 0116 13H6a1 1 0 00-1 1v3a1 1 0 11-2 0V6z" clip-rule="evenodd" />
                  </svg>
                </div>
              </div>
            </div>
            
            <svg class="w-5 h-5 text-gray-500 shrink-0" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4zm2 6a1 1 0 011-1h6a1 1 0 110 2H7a1 1 0 01-1-1zm1 3a1 1 0 100 2h6a1 1 0 100-2H7z" clip-rule="evenodd" />
            </svg>
          </div>
          
          <p class="text-[13px] text-gray-500 mt-1 mb-2 leading-snug">{{ post.user.role || 'STUDENT' }}, ESPRIT</p>
          <p class="text-[14px] text-gray-600 leading-[1.6]">
            {{ getSnippet(post.content) }}
            <br *ngIf="post.content && post.content.length > 120">
            <a routerLink="/etudiant/feed" class="text-[#e50043] font-semibold hover:underline mt-0.5 inline-block" *ngIf="post.content && post.content.length > 120">Read more</a>
          </p>
        </div>
      </article>
    </ng-container>
  </div>
</div>
