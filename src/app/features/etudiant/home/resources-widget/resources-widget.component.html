<div class="rounded-[24px] bg-white p-6 shadow-sm border border-[#ececec]">
  <h3 class="text-[18px] font-bold text-gray-800 mb-6">Resources</h3>

  <div class="grid grid-cols-1 md:grid-cols-[1fr_1.1fr] gap-6">
    <div class="flex flex-col gap-5">
      <div *ngIf="loading" class="text-[13px] text-gray-500">Loading resources...</div>

      <button
        type="button"
        *ngFor="let file of filesPreview"
        (click)="downloadFile(file)"
        class="flex items-center gap-4 group cursor-pointer text-left"
      >
        <div class="h-14 w-[84px] shrink-0 rounded-xl bg-[#6fc4fb] relative overflow-hidden shadow-inner border-b-2 border-[#3ba9f0] flex items-center justify-center">
          <div class="w-10 h-8 bg-white rounded-sm absolute right-2 bottom-1.5 rotate-[-6deg] border-l-[3px] border-gray-100 shadow-sm"></div>
          <div class="w-10 h-8 bg-white rounded-sm absolute right-2 bottom-2.5 rotate-[-2deg] border-l-[3px] border-gray-100 shadow-sm"></div>
          <div class="w-3 h-10 bg-[#fbbf24] absolute left-3 bottom-1.5 rotate-[15deg] rounded-sm border-r-[2px] border-[#d97706]"></div>
        </div>
        <h4 class="text-[14px] font-bold text-[#e50043] leading-snug group-hover:underline">{{ file.name }}</h4>
      </button>

      <div *ngIf="!loading && filesPreview.length === 0" class="text-[13px] text-gray-500">
        No resources available yet.
      </div>
    </div>

    <div class="bg-[#f8f9fa] rounded-[32px] p-8 flex flex-col items-center text-center">
      <div class="relative w-full aspect-square max-w-[140px] mb-6 flex items-center justify-center">
         <svg class="w-full h-full" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="20" y="80" width="60" height="4" fill="#cbd5e1" rx="2" />
            <rect x="30" y="30" width="8" height="50" fill="#f87171" transform="rotate(-15 30 30)" rx="1" />
            <rect x="42" y="25" width="10" height="55" fill="#fbbf24" rx="1" />
            <rect x="55" y="20" width="8" height="60" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" rx="1" />
            <rect x="66" y="15" width="10" height="65" fill="#4ade80" rx="1" />
            <rect x="79" y="10" width="8" height="70" fill="#60a5fa" rx="1" />
         </svg>
      </div>
      <h4 class="text-[16px] font-bold text-gray-700 mb-2">Explore More Resources</h4>
      <p class="text-[11px] text-gray-500 mb-8 leading-relaxed max-w-[180px]">See more resources to learn, and find helpful tools and information</p>
      <a
        [routerLink]="['/etudiant/resources']"
        [queryParams]="{ viewMode: 'GRID_VIEW' }"
        class="text-[12px] font-bold text-[#e50043] hover:underline uppercase tracking-widest active:scale-95 transition-transform"
      >
        Go to resources
      </a>
    </div>
  </div>
</div>
