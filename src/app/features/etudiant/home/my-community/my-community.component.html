<div class="rounded-[24px] bg-white p-6 shadow-sm border border-[#ececec]">
  <div class="flex items-center justify-between mb-0.5 px-1">
    <h3 class="text-[20px] font-bold text-[#4B5563]">My Community</h3>
    <a [routerLink]="['/etudiant/directory']" class="text-[12px] font-bold uppercase tracking-widest text-[#e50043] hover:underline">All members</a>
  </div>
  <p class="text-[16px] font-bold text-gray-700 mb-4 px-1">Strengthen Your Network</p>

  <div class="bg-[#f8f9fa] rounded-3xl p-6 flex flex-col items-center justify-center min-h-[140px] mb-5 w-full max-w-[280px]">
    <div class="text-gray-400 text-2xl font-bold mb-2">...</div>
    <p class="text-[13px] font-bold text-gray-500 text-center max-w-[140px]">More members coming soon</p>
  </div>

  <div class="border border-gray-100 rounded-[20px] p-4 bg-white shadow-sm">
    <div class="flex items-center gap-2 mb-4 flex-wrap">
       <div class="w-3 h-3 rounded-full bg-green-500 border-2 border-white shadow-md"></div>
       <h4 class="text-[14px] font-bold text-gray-800">See who's on the platform</h4>
       <span class="text-[12px] text-gray-500">See who's online lately</span>
    </div>
    
    <div class="flex items-center gap-4 overflow-x-auto pb-1 no-scrollbar">
       <!-- Dynamic Online Users -->
       <div *ngFor="let user of onlineUsers" 
            class="relative shrink-0 cursor-pointer group"
            [routerLink]="['/etudiant/user', user.id]"
            [title]="user.firstName + ' ' + user.lastName">
         <img [src]="user.avatarUrl || 'https://ui-avatars.com/api/?name=' + user.firstName + '+' + user.lastName" 
              class="w-12 h-12 rounded-full border-2 border-white shadow-sm object-cover transition-transform group-hover:scale-105">
         <div class="absolute bottom-0 right-0.5 w-3.5 h-3.5 bg-green-500 border-2 border-white rounded-full"></div>
       </div>

       <!-- Empty State -->
       <div *ngIf="onlineUsers.length === 0" class="text-gray-400 text-[12px] italic py-2">
         No one is online right now
       </div>
    </div>
  </div>
</div>
