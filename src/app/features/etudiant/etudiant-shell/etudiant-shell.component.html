<div class="shell">
  <app-navbar></app-navbar>

  <!-- Return banner: visible only when admin/enseignant/entreprise is in student view mode -->
  <div *ngIf="isViewSwitchMode" class="role-view-banner">
    <div class="role-view-banner__inner">
      <div class="role-view-banner__left">
        <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
          <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
        </svg>
        <span>Vous naviguez en <strong>Vue Étudiant</strong></span>
      </div>
      <button class="role-view-banner__btn" (click)="returnToRoleView()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
          <path d="M9 14l-4-4 4-4"/><path d="M5 10h10a4 4 0 0 1 0 8h-1"/>
        </svg>
        Retour {{ viewSwitchRoleLabel }}
      </button>
    </div>
  </div>

  <div *ngIf="isHomePage" class="shell__hero" [style.background]="heroBackground()">
    <div class="shell__hero-overlay"></div>
  </div>

  <div class="shell__layout" [ngClass]="{'shell__layout--no-hero': !isHomePage}">
    <app-etudiant-sidebar class="shell__sidebar"></app-etudiant-sidebar>

    <main class="shell__main">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
