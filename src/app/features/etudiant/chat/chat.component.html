<div class="flex flex-col h-[calc(100vh-100px)] bg-gray-50 rounded-2xl shadow-lg overflow-hidden border border-gray-200 animate-fadeIn">
  
  <!-- Chat Header -->
  <div class="bg-white px-6 py-4 flex items-center justify-between border-b border-gray-100">
    <div class="flex items-center gap-4">
      <div class="relative cursor-pointer" [routerLink]="['/etudiant/user', receiverId]">
        <img [src]="receiver?.avatarUrl || 'https://ui-avatars.com/api/?name=' + receiver?.firstName + '+' + receiver?.lastName" 
             class="w-12 h-12 rounded-full object-cover border-2 border-gray-50 shadow-sm">
        <div *ngIf="receiver?.isOnline" class="absolute bottom-0 right-0 w-3.5 h-3.5 bg-green-500 border-2 border-white rounded-full"></div>
      </div>
      <div>
        <h3 class="font-bold text-gray-900 leading-tight">{{ receiver?.firstName }} {{ receiver?.lastName }}</h3>
        <p class="text-xs font-medium" [ngClass]="receiver?.isOnline ? 'text-green-500' : 'text-gray-400'">
          {{ receiver?.isOnline ? 'En ligne' : 'Hors ligne' }}
        </p>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <button class="p-2 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-full transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
      </button>
      <button class="p-2 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-full transition-all" [routerLink]="['/etudiant/user', receiverId]">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
      </button>
    </div>
  </div>

  <!-- Messages Area -->
  <div class="flex-1 overflow-y-auto p-6 space-y-4 no-scrollbar bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]" #scrollMe>
    
    <div *ngIf="messages.length === 0" class="flex flex-col items-center justify-center h-full text-center py-10">
      <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
      </div>
      <p class="text-gray-400 font-medium">Commencez la conversation avec {{ receiver?.firstName }}</p>
    </div>

    <div *ngFor="let msg of messages" 
         class="flex flex-col w-full animate-fadeIn"
         [ngClass]="msg.senderId === currentUser?.id ? 'items-end' : 'items-start'">
      
      <div class="max-w-[75%] lg:max-w-[60%] flex gap-2"
           [ngClass]="msg.senderId === currentUser?.id ? 'flex-row-reverse' : 'flex-row'">
        
        <!-- Avatar -->
        <img *ngIf="msg.senderId !== currentUser?.id"
             [src]="receiver?.avatarUrl || 'https://ui-avatars.com/api/?name=' + receiver?.firstName + '+' + receiver?.lastName"
             class="w-8 h-8 rounded-full object-cover self-end mb-1">

        <div class="flex flex-col" [ngClass]="msg.senderId === currentUser?.id ? 'items-end' : 'items-start'">
          <div class="px-4 py-2.5 rounded-2xl shadow-sm text-sm"
               [ngClass]="msg.senderId === currentUser?.id ? 
                         'bg-[#ED1C24] text-white rounded-tr-none' : 
                         'bg-white text-gray-800 rounded-tl-none border border-gray-100'">
            {{ msg.content }}
          </div>
          <span class="text-[10px] text-gray-400 mt-1 font-medium px-1">
            {{ msg.sentAt | date:'HH:mm' }}
          </span>
        </div>
      </div>
    </div>
  </div>

  <!-- Chat Input -->
  <div class="bg-white p-4 border-t border-gray-100">
    <div class="flex items-center gap-3 bg-gray-50 rounded-full px-4 py-2 border border-gray-200 focus-within:border-[#ED1C24] focus-within:bg-white transition-all shadow-inner">
      <button class="p-1 text-gray-400 hover:text-[#ED1C24] transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
      </button>
      <input type="text" 
             [(ngModel)]="newMessage" 
             (keyup.enter)="sendMessage()" 
             class="flex-1 bg-transparent border-none focus:ring-0 text-sm py-2 text-gray-700 placeholder-gray-400"
             placeholder="Écrivez votre message ici...">
      <button (click)="sendMessage()" 
              [disabled]="!newMessage.trim()"
              class="p-2 bg-[#ED1C24] text-white rounded-full hover:bg-[#D31920] disabled:bg-gray-300 disabled:cursor-not-allowed transition-all shadow-md active:scale-95">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
      </button>
    </div>
  </div>
</div>
